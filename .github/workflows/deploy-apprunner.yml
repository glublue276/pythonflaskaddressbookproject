name: Deploy to AWS App Runner

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag override. Defaults to the current commit SHA.
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: aws-app-runner-deploy
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  APP_RUNNER_SERVICE_ARN: ${{ vars.APP_RUNNER_SERVICE_ARN }}
  APP_RUNNER_BASE_URL: ${{ vars.APP_RUNNER_BASE_URL }}

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.build-image.outputs.image_uri }}
      image_tag: ${{ steps.build-image.outputs.image_tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate deployment configuration
        run: |
          test -n "${AWS_REGION}" || (echo "Missing repo variable AWS_REGION" && exit 1)
          test -n "${ECR_REPOSITORY}" || (echo "Missing repo variable ECR_REPOSITORY" && exit 1)
          test -n "${APP_RUNNER_SERVICE_ARN}" || (echo "Missing repo variable APP_RUNNER_SERVICE_ARN" && exit 1)
          test -n "${APP_RUNNER_BASE_URL}" || (echo "Missing repo variable APP_RUNNER_BASE_URL" && exit 1)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "${ECR_REPOSITORY}" >/dev/null 2>&1 || \
          aws ecr create-repository \
            --repository-name "${ECR_REPOSITORY}" \
            --image-scanning-configuration scanOnPush=true

      - name: Log in to Amazon ECR
        id: login-ecr
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"
          aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${REGISTRY}"

      - name: Build and push image
        id: build-image
        run: |
          IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "${IMAGE_TAG}" ]; then
            IMAGE_TAG="${GITHUB_SHA::7}"
          fi

          IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          LATEST_IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:latest"

          docker build -t "${IMAGE_URI}" -t "${LATEST_IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          docker push "${LATEST_IMAGE_URI}"

          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Trigger App Runner deployment
        run: |
          aws apprunner start-deployment \
            --service-arn "${APP_RUNNER_SERVICE_ARN}"

  verify:
    name: verify
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for health endpoint
        run: |
          HEALTH_URL="${APP_RUNNER_BASE_URL%/}/health"
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error "${HEALTH_URL}"; then
              echo
              echo "Health check passed for ${HEALTH_URL}"
              exit 0
            fi
            echo "Attempt ${attempt}/30 failed. Waiting for deployment to become healthy..."
            sleep 20
          done
          echo "Deployment health check failed for ${HEALTH_URL}"
          exit 1

      - name: Write deployment metadata
        if: always()
        run: |
          cat <<EOF > deployment-summary.txt
          image_uri=${{ needs.deploy.outputs.image_uri }}
          image_tag=${{ needs.deploy.outputs.image_tag }}
          app_runner_base_url=${APP_RUNNER_BASE_URL}
          workflow_run_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF

      - name: Upload deployment metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aws-app-runner-deploy-metadata
          path: deployment-summary.txt
          if-no-files-found: warn
